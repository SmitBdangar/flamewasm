name: Fuzz

on:
  schedule:
    - cron: "0 2 * * *"   # nightly at 02:00 UTC
  workflow_dispatch:
    inputs:
      duration:
        description: "Fuzz duration per target (seconds)"
        default: "300"
        required: false

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [fuzz_parser, fuzz_validator, fuzz_compile]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzzer
        run: |
          cargo fuzz run ${{ matrix.target }} fuzz/corpus -- \
            -max_total_time=${{ github.event.inputs.duration || '300' }} \
            -max_len=65536
        working-directory: fuzz/
      - name: Upload corpus coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: fuzz/corpus/
